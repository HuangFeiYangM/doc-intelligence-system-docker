# version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: doc_intel_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-doc_intel}
      MYSQL_USER: ${MYSQL_USER:-user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: doc_intel_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # FastAPI Backend
  backend:
    build: ./backend
    container_name: doc_intel_backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=${DATABASE_URL:-mysql+asyncmy://user:password@mysql:3306/doc_intel}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/1}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      - DEBUG=${DEBUG:-true}
    env_file:
      - ./backend/.env.backend
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/templates:/app/templates
      - ./backend/outputs:/app/outputs
      - ./backend/logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python start_app.py

  # Celery Worker (Optional - for background task processing)
  celery_worker:
    build: ./backend
    container_name: doc_intel_celery
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL:-mysql+asyncmy://user:password@mysql:3306/doc_intel}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/1}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
    env_file:
      - ./backend/.env.backend
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/templates:/app/templates
      - ./backend/outputs:/app/outputs
    depends_on:
      - mysql
      - redis
    command: celery -A app.core.celery_app worker --loglevel=info

volumes:
  mysql_data:
  redis_data:
