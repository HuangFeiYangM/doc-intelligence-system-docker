[pytest]
testpaths = backend/app/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    --strict-markers
    --tb=short

[tool:pytest]
markers =
    deepseek: tests that require DeepSeek API access
    integration: integration tests
    slow: slow running tests
    api: tests that call external APIs
    unit: unit tests (no external dependencies)

# Test configuration
# To run tests with specific environment file:
#   pytest --env-file .env.test
#
# To skip API tests:
#   pytest -k "not deepseek and not api"
#
# To run only unit tests:
#   pytest -m unit